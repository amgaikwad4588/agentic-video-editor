services:
  backend:
    build: ./backend
    environment:
      # Pass through from host env / .env file next to this compose file.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - media-data:/srv/backend/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  media-data:
