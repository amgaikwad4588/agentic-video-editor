# Render Blueprint — deploys the FastAPI + FFmpeg backend as a Docker service.
#
# One-click deploy:
#   1. https://dashboard.render.com → New → Blueprint
#   2. Select the agentic-video-editor GitHub repo → Apply
#   3. Set ANTHROPIC_API_KEY when prompted (optional; agent chat only)
#
# Notes:
# - The free plan has an ephemeral filesystem and spins down when idle:
#   uploads/renders are lost on restart and the first request after idling
#   is slow. Fine for a demo. For real use, switch plan to `starter` and
#   uncomment the disk block so /srv/backend/data persists.
# - After this service is live, set BACKEND_URL on the Vercel frontend to
#   the service URL (e.g. https://agentic-video-editor-api.onrender.com)
#   and redeploy the frontend.

services:
  - type: web
    name: agentic-video-editor-api
    runtime: docker
    repo: https://github.com/amgaikwad4588/agentic-video-editor
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Set ONE of these for the agent chat (Gemini has a free tier).
      # Anthropic is preferred when both are present; AGENT_PROVIDER overrides.
      - key: GEMINI_API_KEY
        sync: false          # prompted in the dashboard; never committed
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://agentic-video-editor-zeta.vercel.app"]'
    # disk:                  # requires paid plan; persists media + SQLite
    #   name: media-data
    #   mountPath: /srv/backend/data
    #   sizeGB: 10
